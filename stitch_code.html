                </h1>
<p class="font-label-code text-label-code text-on-surface-variant/60 uppercase tracking-[0.3em] mt-2">
                    Architectural Network Protocol
                </p>
</div>
</div>
<!-- Progress Section -->
<div class="w-full max-w-md space-y-6">
<!-- Loading Bar -->
<div class="relative h-[2px] w-full bg-secondary-container/20 overflow-hidden">
<div class="absolute top-0 left-0 h-full bg-primary-fixed-dim glow-cyan animate-[loading-progress_6s_ease-in-out_forwards]" id="progress-bar">
</div>
</div>
<!-- Metadata Readout -->
<div class="flex justify-between items-center px-1">
<span class="font-label-code text-label-code text-primary-fixed-dim" id="percentage-display">00%</span>
<div class="flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-primary-fixed-dim animate-pulse"></span>
<span class="font-label-code text-label-code text-on-surface-variant/40">SYSTEM_UPTIME: 0.003s</span>
</div>
</div>
<!-- Terminal Component -->
<div class="bg-surface-container-lowest/40 backdrop-blur-md border border-white/5 p-4 h-32 overflow-hidden relative">
<div class="font-label-code text-[10px] md:text-label-code text-on-surface-variant/80 terminal-scroll" id="terminal-output">
<!-- Lines injected by script -->
</div>
<div class="absolute bottom-4 left-4 font-label-code text-primary-fixed-dim animate-[blink_1s_infinite]">_</div>
</div>
</div>
<!-- Footer Visuals -->
<div class="fixed bottom-margin-desktop left-0 w-full flex justify-between px-margin-desktop pointer-events-none opacity-20">
<div class="flex gap-4">
<div class="flex flex-col gap-1">
<div class="w-12 h-1 bg-primary-fixed-dim"></div>
<div class="w-8 h-1 bg-on-surface-variant"></div>
</div>
<span class="font-label-code text-label-code">SECURE_CHANNEL_ACTIVE</span>
</div>
<div class="text-right">
<span class="font-label-code text-label-code">BUILD_V4.0.2_BETA</span>
<p class="font-label-code text-[10px]">AUTHORIZED_OPERATORS_ONLY</p>
</div>
</div>
</main>
<script>
        const terminalOutput = document.getElementById('terminal-output');
        const percentageDisplay = document.getElementById('percentage-display');
        const progressBar = document.getElementById('progress-bar');

        const bootLogs = [
            "INITIALIZING CORE_SYSTEM...",
            "VERIFYING_KERNEL_INTEGRITY...",
            "ESTABLISHING SECURE_LINK [AES-256]...",
            "MOUNTING DATA_VAULT_PARTITION...",
            "ENCRYPTING DATA_VAULT...",
            "BYPASSING NETWORK_GRID_FIREWALL...",
            "SYNCING_NODES: [ALPHA, BETA, GAMMA, DELTA]...",
            "BUFFERING_NEURAL_INTERFACE...",
            "CHECKING_ACCESS_LEVEL: [OPERATOR_01]...",
            "CLEARING_CACHE_REGISTRY...",
            "COMMEXUS_SHELL_DEPLOYED.",
            "READY_FOR_INPUT."
        ];

        let logIndex = 0;
        let percentage = 0;

        function addLog() {
            if (logIndex < bootLogs.length) {
                const line = document.createElement('div');
                line.className = 'mb-1 opacity-0 translate-y-2 transition-all duration-300';
                line.textContent = `> ${bootLogs[logIndex]}`;
                terminalOutput.prepend(line);
                
                // Trigger animation
                requestAnimationFrame(() => {
                    line.classList.remove('opacity-0', 'translate-y-2');
                });

                logIndex++;
                setTimeout(addLog, Math.random() * 800 + 400);
            }
        }

        function updateProgress() {
            if (percentage < 100) {
                percentage += Math.floor(Math.random() * 3) + 1;
                if (percentage > 100) percentage = 100;
                percentageDisplay.textContent = `${percentage.toString().padStart(2, '0')}%`;
                setTimeout(updateProgress, Math.random() * 200 + 50);
            } else {
                percentageDisplay.classList.add('text-secondary-container');
                percentageDisplay.textContent = 'ACCESS GRANTED';
            }
        }

        // Initialize micro-interactions
        window.onload = () => {
            setTimeout(addLog, 500);
            setTimeout(updateProgress, 200);
        };

        // Subtle parallax effect on logo
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            const y = (window.innerHeight / 2 - e.pageY) / 50;
            const logo = document.querySelector('.hex-shadow');
            if (logo) {
                logo.style.transform = `translate(${x}px, ${y}px)`;
            }
        });
    </script>
