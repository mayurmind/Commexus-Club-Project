<!-- Interactive Layer -->
<div class="fixed inset-0 pointer-events-none opacity-5">
<div class="absolute top-0 left-0 w-full h-full bg-[radial-gradient(circle_at_50%_50%,_rgba(0,104,122,0.1)_0%,_transparent_50%)]"></div>
</div>
<script>
        // Subtle interaction for the desaturated logo on mouse movement or just atmospheric breathe
        document.addEventListener('mousemove', (e) => {
            const logo = document.querySelector('.desaturated-logo');
            if (logo) {
                const x = (window.innerWidth / 2 - e.pageX) / 50;
                const y = (window.innerHeight / 2 - e.pageY) / 50;
                logo.style.transform = `translate(${x}px, ${y}px)`;
            }
        });
